<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نبراس الجزيرة للمحاماة والاستشارات القانونية</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicons/favicon-16x16.png" />
    <link rel="manifest" href="/assets/images/favicons/site.webmanifest" />

    <link rel="preload" as="image" href="/assets/images/نبراس-الجزيرة-للمحاماة-والاستشارات-القانونية.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

    <link rel="stylesheet" href="/assets/vendors/bootstrap/css/bootstrap.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="/assets/vendors/fontawesome/css/all.min.css" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="/assets/vendors/procounsel-icons/style.css" media="print" onload="this.media='all'" />

    <link rel="stylesheet" href="/assets/css/procounsel.css" />
    <link rel="stylesheet" href="/assets/css/procounsel-rtl.css" />
    <link rel="stylesheet" href="/assets/css/procounsel-custom-rtl.css" />

    <style>
        html {
            background-color: #324556;
            scroll-behavior: smooth;
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }
        }

        .skip-link {
            position: absolute;
            top: -48px;
            right: 20px;
            z-index: 10000;
            padding: 12px 18px;
            background: #ffffff;
            color: #324556;
            border-radius: 8px;
            font-weight: 700;
        }

        .skip-link:focus {
            top: 20px;
        }

        .main-slider-five__quote {
            margin: 28px 0 0;
            padding: 20px 24px;
            border-inline-start: 4px solid #c89f67;
            background: rgba(255, 255, 255, 0.08);
        }

        .main-slider-five__quote p,
        .main-slider-five__quote footer {
            margin: 0;
        }

        .main-slider-five__quote footer {
            margin-top: 12px;
        }

        .footer-widget__contact-list {
            display: grid;
            gap: 14px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .footer-widget__contact-list a,
        .footer-widget__contact-list span {
            color: inherit;
        }

        .whatsapp-float {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #25d366;
            color: #ffffff;
            box-shadow: 0 14px 28px rgba(37, 211, 102, 0.35);
            z-index: 999;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .whatsapp-float:hover,
        .whatsapp-float:focus-visible {
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 18px 30px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-float i {
            font-size: 30px;
            line-height: 1;
        }

        #splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #324556;
            gap: 24px;
        }

        #splash img {
            width: 180px;
            animation: fadeInSplash 0.4s ease both;
        }

        @keyframes fadeInSplash {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"><div id="splash"><img src="/assets/images/نبراس-الجزيرة-للمحاماة-والاستشارات-القانونية.png" alt="نبراس الجزيرة" width="180" /></div></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
